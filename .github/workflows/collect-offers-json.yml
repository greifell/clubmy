name: Atualizar Ofertas JSON

on:
  schedule:
    - cron: '0 9,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-offers-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect offers
        run: npm run collect:offers

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Atualiza ofertas de supermercados
          file_pattern: public/data/offers-vtex.json frontend/public/data/offers-vtex.json archive/expired-offers.json
