name: Rodar Robo Clubmy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 08 * * *'

jobs:
  construir-e-rodar:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar o código do repositório
        uses: actions/checkout@v4 # Atualizei para a versão mais nova

      - name: Instalar o Python
        uses: actions/setup-python@v5 # Atualizei para a versão mais nova
        with:
          python-version: '3.10'

      - name: Instalar dependências do Sistema (O segredo do erro!)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx

      - name: Instalar as ferramentas do Robô
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Mandar o robô trabalhar
        run: python meu_robo.py
