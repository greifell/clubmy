name: Rodar Robo Clubmy

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  update-offers:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate database configuration
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::O secret DATABASE_URL não está configurado no repositório."
            exit 1
          fi

      - name: Run scraper
        run: npm run cron:update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Collect catalog offers JSON
        run: npm run collect:offers
