name: Atualizar Ofertas JSON

on:
  schedule:
    - cron: '0 9,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-offers-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect offers
        run: npm run collect:offers

      - name: Commit updated JSON
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/offers-vtex.json frontend/public/data/offers-vtex.json

          if [ -f archive/expired-offers.json ]; then
            git add archive/expired-offers.json
          fi

          if git diff --cached --quiet; then
            echo "Nenhuma alteracao de ofertas para publicar."
            exit 0
          fi

          git commit -m "Atualiza ofertas de supermercados"
          git push origin HEAD:main
